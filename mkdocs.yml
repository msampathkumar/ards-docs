# Project information
site_name: Augment Discovery Protocol
site_url: https://augmentdiscoveryprotocol.io/
site_description: A protocol for discovering augments — tools, Skills, MCP servers, APIs, workflows, and agents — for AI clients
repo_name: augment-discovery-protocol/docs
repo_url: https://github.com/augment-discovery-protocol/docs

# Configuration
theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/logo.svg
  font:
    text: Outfit
    code: Fira Code
  palette:
    - scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.select
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.follow

# Extensions
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      dedent_subsections: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

# Custom CSS
extra_css:
  - stylesheets/custom.css
  - stylesheets/homepage.css

# Plugins
plugins:
  - search

# Navigation
nav:
  - Introduction: index.md
