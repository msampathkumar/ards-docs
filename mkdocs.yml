# Project information
site_name: agenticresourcediscovery.io
site_url: https://agenticresourcediscovery.io/
site_description: A protocol for discovering agentic resources — tools, Skills, MCP servers, APIs, workflows, and agents — for AI clients

# Configuration
theme:
  name: material
  custom_dir: overrides
  font:
    text: Outfit
    code: Fira Code
  palette:
    scheme: default
    primary: white
    accent: indigo
  features:
    - content.code.copy
    - content.code.select
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    # navigation.instant disabled: incompatible with StatiCrypt per-page
    # encryption (instant-loading fetches the encrypted template fragment
    # and injects it broken). Re-enable when password protection is removed.
    # - navigation.instant
    # - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.follow

# Extensions
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      dedent_subsections: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

# Hide the "Made with Material for MkDocs" footer attribution
extra:
  generator: false

# Custom CSS
extra_css:
  - stylesheets/custom.css
  - stylesheets/homepage.css
  - stylesheets/nav.css

# Plugins
# Empty list (not omitted) so MkDocs does NOT re-enable its default `search`
# plugin — this removes the header search box.
plugins:
  # `comparisons` was renamed to `interoperability`; keep the old URL working.
  - redirects:
      redirect_maps:
        comparisons.md: interoperability.md
        how_agents_search.md: how_to_build_a_client.md

# Navigation
nav:
  - Home: index.md
  - About:
    - Introduction: introduction.md
    - Why ARD?: why.md
    - Interoperability: interoperability.md
    - Contributors: contributors.md
    - FAQ: faq.md
  - Guides:
    - Connect a chatbot: connect.md
    - How to publish: how_to_publish.md
    - How to build a client: how_to_build_a_client.md
  - Specifications:
    - ARD Specification: spec.md
    - AI Catalog Standard: ai_catalog_spec.md
